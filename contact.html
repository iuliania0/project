<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/fonts.css">
    <link rel="stylesheet" href="styles/style.css">
    <title>Document</title>
</head>
<body>
    <header class="contact_header">
        <div class="navigation_container">
            <a href="./index.html"> Ayush Barnwal </a>
            <svg class="burger_button" width="40" height="40" viewBox="0 0 52 37" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3.5 3.5C21.0736 3.5 30.9264 3.5 48.5 3.5" stroke="#F1F1F1" stroke-width="7" stroke-linecap="round"/>
                <path d="M3.5 18.5C21.0736 18.5 30.9264 18.5 48.5 18.5" stroke="#F1F1F1" stroke-width="7" stroke-linecap="round"/>
                <path d="M3.5 33.5C21.0736 33.5 30.9264 33.5 48.5 33.5" stroke="#F1F1F1" stroke-width="7" stroke-linecap="round"/>
            </svg>
            <nav>
                <ul class="nav">
                    <li><a class="nav__link" href="#">About</a></li>
                    <li><a class="nav__link" href="#">Work</a></li>
                    <li><a class="nav__link" href="#">Contact</a> </li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="contact_main_container">
        <section class="contact_container">
            <div class="contact_info_container">
                <img src="./images/avatar_contact.png" alt="personal photo">
                <div>
                    <h2 class="title_contact_info">Contact Details</h2>
                    <ul class="contact_info_cont">
                        <li class="contact_info">ayush.barnwal@brightscout.com</li>
                        <li class="contact_info">+91 8651447521</li>
                    </ul>
                </div>
                <div>
                    <h3 class="title_contact_info">Social</h3>
                    <ul class="contact_info_cont">
                        <li><a class="contact_nav__link" href="#">Linkedin</a></li>
                        <li><a class="contact_nav__link" href="#">Instagram</a></li>
                        <li><a class="contact_nav__link" href="#">X</a></li>
                        <li><a class="contact_nav__link" href="#">Webfl;ow</a></li>
                        <li><a class="contact_nav__link" href="#">Figma</a></li>
                    </ul>
                </div>
            </div>
            <div>
                <h1 class="contact_title">Let’s build something cool</h1>
                <form class="contact_form" action="/submit" method="post">
                    <label class="contact__label" for="name">Name</label>
                    <input class="contact__input" type="text" id="name" name="name" placeholder="Type your Name" value="Ayush Barnwal">
                    <label class="contact__label" for="email">Email</label>
                    <input class="contact__input" type="email" id="email" name="email" placeholder="Type your Email" value="ayush.barnwal@brightscout.com">
                    <label class="contact__label" for="subject">Subject</label>
                    <input class="contact__input" type="text" id="subject" name="subject" placeholder="Type your Subject" value="For web design work Enquire">
                    <label class="contact__label" for="message">Message</label>
                    <textarea class="contact__textarea" id="message" name="message" placeholder="Type your Message"></textarea>
                    <button class="contact__button" type="submit">Send Message</button>
                </form>
            </div>
        </section>
    </main>
    <footer>
        <div class="footer_container">
            <div class="footer_nav_container">
                <span>Build with 💖 by Brightscout & Ayush</span>
                <nav>
                    <ul class="footer_nav">
                        <li><a class="footer_nav__link" href="#">Linkedin</a></li>
                        <li><a class="footer_nav__link" href="#">Twitter</a></li>
                        <li><a class="footer_nav__link" href="#">Instagram</a> </li>
                        <li><a class="footer_nav__link" href="#">Webflow</a> </li>
                    </ul>
                </nav>
            </div>
        </div>
    </footer>
</body>
</html>
